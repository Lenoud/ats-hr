<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Search Service</title>
    <style>
        :root {
            --bg: #f5efe2;
            --panel: rgba(255, 252, 245, 0.92);
            --ink: #1d2a33;
            --muted: #5b6c74;
            --accent: #b2552d;
            --accent-2: #2f6f62;
            --line: rgba(29, 42, 51, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(178, 85, 45, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(47, 111, 98, 0.16), transparent 24%),
                linear-gradient(135deg, #f3ebdb, #e7dfcf 55%, #efe8dc);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: min(760px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 28px 70px rgba(41, 36, 26, 0.16);
            backdrop-filter: blur(12px);
        }
        .eyebrow {
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 12px;
        }
        h1 {
            margin: 0 0 12px;
            font-size: clamp(32px, 5vw, 52px);
            line-height: 1.05;
        }
        p {
            margin: 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.6;
        }
        .grid {
            margin-top: 28px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
        }
        .tile {
            padding: 16px;
            border-radius: 18px;
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.65);
        }
        .tile strong {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--ink);
        }
        .tile span {
            color: var(--muted);
            font-size: 15px;
            line-height: 1.5;
        }
        .actions {
            margin-top: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 160px;
            padding: 12px 18px;
            border-radius: 999px;
            text-decoration: none;
            color: white;
            background: var(--accent);
        }
        a.secondary {
            background: var(--accent-2);
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="eyebrow">ATS Platform</div>
        <h1>Search Service</h1>
        <p>负责简历全文检索、条件筛选，以及消费简历事件并同步 Elasticsearch 索引。</p>
        <section class="grid">
            <div class="tile">
                <strong>HTTP API</strong>
                <span>`GET /api/v1/search` 与 `POST /api/v1/search/advanced`</span>
            </div>
            <div class="tile">
                <strong>Search Engine</strong>
                <span>Elasticsearch 8.x 索引 `resumes`</span>
            </div>
            <div class="tile">
                <strong>Event Sync</strong>
                <span>消费 `resume:events`，同步创建、删除和状态更新</span>
            </div>
        </section>
        <div class="actions">
            <a href="/health">Health</a>
            <a class="secondary" href="/ready">Ready</a>
        </div>
    </main>
</body>
</html>
